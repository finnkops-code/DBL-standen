name: DBL Standen Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: pip install cloudscraper requests

      - name: Standen scrapen
        run: python dbl_scraper.py

      - name: Debug HTML uploaden (alleen bij fout)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_html.txt

      - name: JSON bestand committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dbl_standen.json
          git diff --staged --quiet || git commit -m "DBL standen bijgewerkt: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
